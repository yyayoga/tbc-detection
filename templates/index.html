<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lung X-Ray Classification: Normal vs TBC</title>
    <!-- Tailwind CSS for modern and clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-rose-100 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute top-0 left-0 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob pointer-events-none"></div>
    <div class="absolute top-0 right-0 w-72 h-72 bg-rose-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000 pointer-events-none"></div>

    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-lg w-full p-8 border border-white/60 relative z-10 transition-all duration-300 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-rose-900 mb-2 tracking-tight">Lung X-Ray Analyzer</h1>
            <p class="text-rose-600/70 text-sm font-medium">Upload a chest X-ray image to detect 'Normal' or 'TBC' condition.</p>
        </div>

        <!-- Upload Form -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select X-Ray Image (PNG/JPG)</label>
            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-rose-200 border-dashed rounded-2xl transition-all duration-300 hover:border-rose-400 hover:bg-rose-50/50 bg-rose-50/20 group cursor-pointer relative" onclick="document.getElementById('imageInput').click()">
                <div class="space-y-1 text-center">
                    <svg class="mx-auto h-12 w-12 text-rose-300 mb-3 group-hover:text-rose-400 group-hover:scale-110 transition-all duration-300 ease-out" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="flex text-sm text-gray-500 justify-center">
                        <label for="imageInput" class="relative cursor-pointer rounded-md font-medium text-rose-600 hover:text-rose-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-rose-200 bg-transparent">
                            <span>Upload a file</span>
                            <input id="imageInput" name="image" type="file" class="sr-only" accept="image/png, image/jpeg, image/jpg" onchange="previewImage(event)" onclick="event.stopPropagation()">
                        </label>
                        <p class="pl-1 text-gray-400 transition-colors group-hover:text-gray-500">or drag and drop</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image Preview -->
        <div id="previewContainer" class="hidden mb-6 animate-fade-in-up">
            <p class="text-sm font-medium text-gray-700 mb-2">Image Preview</p>
            <img id="imagePreview" src="#" alt="Preview" class="rounded-2xl object-contain max-h-64 w-full border border-rose-100 bg-rose-50/50 p-1 shadow-sm">
        </div>

        <!-- Analyze Button -->
        <button onclick="analyzeImage()" id="analyzeBtn" class="w-full bg-rose-500 text-white font-semibold py-3 px-4 rounded-2xl shadow-md hover:bg-rose-600 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-400 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-[0.98]">
            Analyze Image
        </button>

        <!-- Result Display -->
        <div id="resultContainer" class="hidden mt-8 animate-fade-in-up">
            <div class="p-6 rounded-2xl border border-rose-100 shadow-sm bg-gradient-to-b from-rose-50/50 to-white text-center relative overflow-hidden">
                <p class="text-xs text-rose-400 uppercase tracking-widest font-bold mb-2">Analysis Result</p>
                <div id="resultLabel" class="text-3xl font-extrabold text-gray-900 mb-3 drop-shadow-sm"></div>
                <div class="flex justify-center items-center gap-2">
                    <span class="text-sm font-medium text-gray-500">Confidence Score</span>
                    <span id="resultConfidence" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wide bg-rose-100 text-rose-800 border border-rose-200"></span>
                </div>
            </div>
        </div>
        
        <!-- Error Display -->
        <div id="errorContainer" class="hidden mt-6 p-4 rounded-2xl bg-red-50 border border-red-200 animate-fade-in-up">
            <p id="errorText" class="text-sm text-red-600 font-medium text-center"></p>
        </div>

    </div>

    <script>
        function previewImage(event) {
            const input = event.target;
            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');
            
            // Hide previous results
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                previewContainer.classList.add('hidden');
            }
        }

        async function analyzeImage() {
            const fileInput = document.getElementById('imageInput');
            const resultContainer = document.getElementById('resultContainer');
            const resultLabel = document.getElementById('resultLabel');
            const resultConfidence = document.getElementById('resultConfidence');
            const errorContainer = document.getElementById('errorContainer');
            const errorText = document.getElementById('errorText');
            const analyzeBtn = document.getElementById('analyzeBtn');

            if (!fileInput.files || fileInput.files.length === 0) {
                showError("Please select an image first.");
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            // UI Loading state
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing...
            `;
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const textResponse = await response.text();
                let data;
                try {
                    data = JSON.parse(textResponse);
                } catch (e) {
                    console.error("Raw response:", textResponse);
                    if (textResponse.trim() === "") {
                        throw new Error(`Server returned an empty response. Was the file too large? (Status ${response.status})`);
                    } else {
                        throw new Error(`Server error: ${textResponse.substring(0, 100)}...`);
                    }
                }

                if (!response.ok) {
                    throw new Error(data.error || "Something went wrong processing the image.");
                }

                // Show Results
                resultLabel.textContent = data.label;
                
                // Color coding based on result
                if (data.label === "Normal") {
                    resultLabel.className = "text-3xl font-extrabold text-green-600 mb-3 drop-shadow-sm";
                } else {
                    resultLabel.className = "text-3xl font-extrabold text-red-600 mb-3 drop-shadow-sm";
                }

                resultConfidence.textContent = data.confidence;
                resultContainer.classList.remove('hidden');

            } catch (error) {
                showError(error.message);
            } finally {
                // Restore button
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = "Analyze Image";
            }
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
        }
    </script>
</body>
</html>
